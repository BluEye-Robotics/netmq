name: Publish to GitHub Packages

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    env:
      DOTNET_NOLOGO: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build
        run: dotnet build src/NetMQ/NetMQ.csproj -c Release /p:TargetFrameworks=net10.0
      - name: Test
        run: dotnet test src/NetMQ.Tests/NetMQ.Tests.csproj -c Release --no-build -f net10.0 -p:ParallelizeTestCollections=false --filter "ClassName!=NetMQ.Tests.BeaconTests&ClassName!=NetMQ.Tests.PgmTests"
      - name: Pack
        run: dotnet pack src/NetMQ/NetMQ.csproj -c Release -o packages /p:PackageVersion=4.0.3.${{ github.run_number }} /p:TargetFrameworks=net10.0
      - name: Push to GitHub Packages
        run: dotnet nuget push packages/*.nupkg --source "https://nuget.pkg.github.com/BluEye-Robotics/index.json" --api-key ${{ secrets.GITHUB_TOKEN }}
